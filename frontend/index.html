<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EcoYield AI — Wafer Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #07070F;
  --surface:  #0F0F1E;
  --card:     #141428;
  --border:   #1F1F3F;
  --border2:  #2A2A50;
  --red:      #E8192C;
  --red-dim:  rgba(232,25,44,0.12);
  --orange:   #F5821F;
  --green:    #00D87A;
  --teal:     #00BCD4;
  --purple:   #8B5CF6;
  --yellow:   #F5C518;
  --white:    #EEEEFF;
  --muted:    #55557A;
  --muted2:   #3A3A60;
  --font:     'Bricolage Grotesque', sans-serif;
  --mono:     'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--font);
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,25,44,0.06) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* Header */
header{
  height:56px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
  background:rgba(7,7,15,0.9);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:200;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-weight:800;font-size:1.1rem;letter-spacing:-0.03em;
}
.logo-hex{
  width:30px;height:30px;
  background:var(--red);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;
}
.logo em{color:var(--red);font-style:normal}
.header-right{display:flex;align-items:center;gap:12px}
.pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:0.6rem;color:var(--muted);
  border:1px solid var(--border);padding:3px 8px;
}
.dot{width:5px;height:5px;border-radius:50%}
.dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
.dot.red{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Nav Tabs */
.tabs{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--surface);padding:0 1.5rem;
}
.tab{
  padding:.7rem 1.2rem;
  font-size:.8rem;font-weight:600;
  color:var(--muted);border-bottom:2px solid transparent;
  cursor:pointer;transition:all .15s;letter-spacing:0.01em;
  background:none;border-top:none;border-left:none;border-right:none;
}
.tab:hover{color:var(--white)}
.tab.active{color:var(--white);border-bottom-color:var(--red)}

/* Content */
.content{flex:1;display:flex;flex-direction:column}

/* ── ANALYZE PAGE ── */
.analyze-layout{
  display:grid;grid-template-columns:340px 1fr;
  flex:1;gap:0;
}

/* Left */
.panel-left{
  border-right:1px solid var(--border);
  padding:1.2rem;
  display:flex;flex-direction:column;gap:1rem;
  overflow-y:auto;
  max-height:calc(100vh - 113px);
}
.section-label{
  font-family:var(--mono);font-size:.58rem;color:var(--muted);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;
}

/* Upload */
.upload-zone{
  border:1.5px dashed var(--border2);
  padding:1.5rem 1rem;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;
}
.upload-zone:hover,.upload-zone.drag{
  border-color:var(--red);background:var(--red-dim);
}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:1.8rem;margin-bottom:.4rem}
.upload-title{font-size:.85rem;font-weight:700;margin-bottom:.25rem}
.upload-sub{font-family:var(--mono);font-size:.6rem;color:var(--muted)}

/* Wafer preview */
.wafer-wrap{
  background:var(--card);border:1px solid var(--border);
  padding:1rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;
}
.wafer-ring{
  width:140px;height:140px;border-radius:50%;
  border:2px solid var(--border2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:var(--surface);position:relative;
}
.wafer-ring canvas{border-radius:50%}
.wafer-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  color:var(--muted);font-family:var(--mono);font-size:.6rem;
}
.file-info{font-family:var(--mono);font-size:.58rem;color:var(--muted);text-align:center;line-height:1.6}

/* Model stack */
.model-stack{
  background:var(--card);border:1px solid var(--border);
  padding:.8rem 1rem;
}
.model-row{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:.6rem;padding:.25rem 0;
  border-bottom:1px solid var(--border);
}
.model-row:last-child{border-bottom:none}
.model-key{color:var(--muted)}
.model-val{color:var(--white);text-align:right}
.model-val.ok{color:var(--green)}
.model-val.amd{color:var(--orange)}

/* Buttons */
.btn-primary{
  width:100%;background:var(--red);color:#fff;
  border:none;cursor:pointer;padding:.85rem;
  font-family:var(--font);font-size:.85rem;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  transition:all .15s;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
}
.btn-primary:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--muted2);cursor:not-allowed;transform:none}
.btn-secondary{
  width:100%;background:transparent;
  border:1px solid var(--border2);color:var(--muted);cursor:pointer;
  padding:.6rem;font-family:var(--mono);font-size:.62rem;
  transition:all .15s;letter-spacing:.05em;
}
.btn-secondary:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed}

/* Right panel */
.panel-right{
  padding:1.2rem;
  overflow-y:auto;max-height:calc(100vh - 113px);
  display:flex;flex-direction:column;gap:1rem;
}

/* Empty state */
.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1rem;color:var(--muted);text-align:center;min-height:350px;
}
.empty-icon{font-size:3rem;opacity:.25}
.empty-h{font-size:1rem;font-weight:700;opacity:.4}
.empty-p{font-family:var(--mono);font-size:.62rem;opacity:.35;max-width:280px;line-height:1.7}

/* Loading */
.loading-box{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;min-height:350px;
}
.spinner{
  width:44px;height:44px;border:2px solid var(--border2);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-family:var(--mono);font-size:.62rem;color:var(--muted);letter-spacing:.1em}
.loading-step{font-family:var(--mono);font-size:.6rem;color:var(--orange);animation:blink 1s infinite}

/* Result header */
.result-head{
  background:var(--card);border:1px solid var(--border);
  border-left:3px solid var(--red);
  padding:1.1rem 1.3rem;
  display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;
}
.defect-title{font-size:1.9rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.defect-desc{font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-top:.35rem}
.tag-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem}
.tag{
  font-family:var(--mono);font-size:.58rem;font-weight:500;
  padding:2px 8px;letter-spacing:.08em;text-transform:uppercase;
}
.tag-sev-none    {background:rgba(0,216,122,.12);color:var(--green);border:1px solid var(--green)}
.tag-sev-low     {background:rgba(0,188,212,.12);color:var(--teal);border:1px solid var(--teal)}
.tag-sev-medium  {background:rgba(245,130,31,.12);color:var(--orange);border:1px solid var(--orange)}
.tag-sev-high    {background:rgba(232,25,44,.15);color:var(--red);border:1px solid var(--red)}
.tag-sev-critical{background:rgba(232,25,44,.25);color:#FF6080;border:1px solid #FF6080}
.tag-gray{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.tag-amd{background:rgba(245,130,31,.1);color:var(--orange);border:1px solid rgba(245,130,31,.3)}

.conf-big{font-size:1.5rem;font-weight:800;font-family:var(--mono);color:var(--green);text-align:right}
.conf-lbl{font-family:var(--mono);font-size:.55rem;color:var(--muted);text-align:right;letter-spacing:.1em}

/* Cascade alert */
.cascade{
  background:rgba(232,25,44,.07);
  border:1px solid rgba(232,25,44,.3);
  padding:.8rem 1rem;
  display:flex;gap:.8rem;align-items:flex-start;
}
.cascade-icon{font-size:1.1rem;flex-shrink:0;padding-top:1px}
.cascade-text{font-family:var(--mono);font-size:.63rem;line-height:1.7;color:var(--white)}
.cascade-text strong{color:var(--red)}

/* Two col grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem}

/* Card */
.card{background:var(--card);border:1px solid var(--border);padding:1rem 1.1rem}
.card-title{
  font-family:var(--mono);font-size:.58rem;color:var(--muted);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:.8rem;
}

/* Heatmap */
.heatmap{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.hm-cell{
  aspect-ratio:1;border-radius:1px;cursor:crosshair;
  transition:transform .1s;
}
.hm-cell:hover{transform:scale(1.4);z-index:2}

/* Confidence bars */
.conf-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.conf-name{font-family:var(--mono);font-size:.58rem;width:70px;flex-shrink:0;color:var(--muted)}
.conf-bar-bg{flex:1;height:5px;background:var(--border);overflow:hidden}
.conf-bar-fill{height:100%;transition:width .8s cubic-bezier(.16,1,.3,1)}
.conf-val{font-family:var(--mono);font-size:.57rem;width:40px;text-align:right;color:var(--muted)}

/* Stat block */
.stat-val{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:.2rem}
.stat-lbl{font-family:var(--mono);font-size:.57rem;color:var(--muted);line-height:1.5}

/* Yield gauge svg */
.yield-wrap{text-align:center}

/* Sustain grid */
.sustain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.sustain-item{
  background:var(--surface);border:1px solid var(--border);
  padding:.7rem .5rem;text-align:center;
}
.sustain-icon{font-size:1.1rem;margin-bottom:.25rem}
.sustain-val{font-size:.95rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.15rem}
.sustain-lbl{font-family:var(--mono);font-size:.55rem;color:var(--muted);line-height:1.4}

/* AMD strip */
.amd-strip{
  background:linear-gradient(90deg,rgba(232,25,44,.07),rgba(245,130,31,.04));
  border:1px solid rgba(232,25,44,.2);
  padding:.7rem 1rem;display:flex;align-items:center;gap:1rem;
}
.amd-logo{font-weight:900;font-size:1.2rem;color:var(--red);font-family:var(--font);flex-shrink:0}
.amd-details{font-family:var(--mono);font-size:.58rem;color:var(--muted);line-height:1.8}
.amd-details span{color:var(--orange)}

/* ── HISTORY PAGE ── */
.history-page{padding:1.5rem;max-width:1100px;margin:0 auto;width:100%}
.history-table{width:100%;border-collapse:collapse;font-size:.8rem}
.history-table th{
  font-family:var(--mono);font-size:.58rem;color:var(--muted);
  letter-spacing:.1em;text-align:left;padding:.6rem .8rem;
  border-bottom:1px solid var(--border);
}
.history-table td{
  padding:.65rem .8rem;border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.history-table tr:hover td{background:var(--card)}
.badge-defect{
  font-family:var(--mono);font-size:.6rem;font-weight:600;
  padding:2px 8px;border-radius:2px;
}

/* ── STATS PAGE ── */
.stats-page{padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem}
.stats-top{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.stat-card{background:var(--card);border:1px solid var(--border);padding:1.1rem 1.2rem}
.stat-card-val{font-size:1.8rem;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:.3rem}
.stat-card-lbl{font-family:var(--mono);font-size:.6rem;color:var(--muted)}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:.5rem;padding:.5rem 0}
.bar-row{display:flex;align-items:center;gap:.6rem}
.bar-label{font-family:var(--mono);font-size:.6rem;width:80px;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:18px;background:var(--surface);overflow:hidden}
.bar-fill{height:100%;display:flex;align-items:center;padding-left:6px;transition:width .8s cubic-bezier(.16,1,.3,1);min-width:2px}
.bar-count{font-family:var(--mono);font-size:.58rem;white-space:nowrap}

/* ── Toast ── */
.toast{
  position:fixed;bottom:1.2rem;right:1.2rem;
  background:var(--card);border:1px solid var(--green);
  padding:.65rem 1.1rem;z-index:999;
  font-family:var(--mono);font-size:.62rem;color:var(--green);
  animation:toastIn .3s ease;pointer-events:none;
}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:800px){
  .analyze-layout{grid-template-columns:1fr}
  .panel-left{max-height:none}
  .panel-right{max-height:none}
  .grid-2{grid-template-columns:1fr}
  .stats-top{grid-template-columns:1fr 1fr}
  .sustain-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const API = 'https://ecoyield-ai-production.up.railway.app';


// ── Helpers ────────────────────────────────────────────────────────────
function fmt(n){
  if(n==null)return '—';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return String(Math.round(n));
}
function clr(v){
  if(v<0.5){const t=v*2;return `rgb(${Math.round(10+235*t)},${Math.round(20+104*t*0.6)},${Math.round(80-48*t)})`}
  const t=(v-0.5)*2;return `rgb(${Math.round(245-13*t)},${Math.round(124-99*t)},${Math.round(32+12*t)})`;
}
const SEV_COLORS = {
  none:'var(--green)',low:'var(--teal)',medium:'var(--orange)',high:'var(--red)',critical:'#FF6080'
};
const DEFECT_COLORS = {
  Center:'#FF4444',Donut:'#FF8800','Edge-Loc':'#FFCC00','Edge-Ring':'#FF4488',
  Loc:'#AA44FF','Near-Full':'#FF0000',Scratch:'#4488FF',Random:'#44BBFF',None:'#00D87A'
};

// ── Wafer Canvas ─────────────────────────────────────────────────────
function WaferCanvas({file}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,136,136);
    if(!file){
      ctx.fillStyle='#0F0F1E';ctx.fillRect(0,0,136,136);
      ctx.strokeStyle='#1F1F3F';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(68,68,66,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#1F1F3F';ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(68,4);ctx.lineTo(68,132);ctx.stroke();
      ctx.beginPath();ctx.moveTo(4,68);ctx.lineTo(132,68);ctx.stroke();
      ctx.fillStyle='#2A2A50';ctx.font='8px DM Mono';ctx.textAlign='center';
      ctx.fillText('NO FILE',68,65);ctx.fillText('LOADED',68,76);
      return;
    }
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        ctx.save();
        ctx.beginPath();ctx.arc(68,68,66,0,Math.PI*2);ctx.clip();
        ctx.drawImage(img,0,0,136,136);
        ctx.restore();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  },[file]);
  return <canvas ref={ref} width={136} height={136}/>;
}

// ── Heatmap ───────────────────────────────────────────────────────────
function Heatmap({data}){
  if(!data)return null;
  return(
    <div className="heatmap">
      {data.map((row,r)=>row.map((v,c)=>(
        <div key={`${r}-${c}`} className="hm-cell"
          style={{background:clr(v)}}
          title={`[${r},${c}] ${(v*100).toFixed(0)}%`}/>
      )))}
    </div>
  );
}

// ── Confidence Bars ───────────────────────────────────────────────────
function ConfBars({confs,primary}){
  const sorted=Object.entries(confs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  return(
    <div>
      {sorted.map(([name,val])=>(
        <div className="conf-item" key={name}>
          <span className="conf-name" style={name===primary?{color:'var(--white)'}:{}}>{name}</span>
          <div className="conf-bar-bg">
            <div className="conf-bar-fill"
              style={{
                width:`${(val*100).toFixed(1)}%`,
                background:name===primary?'var(--red)':'var(--border2)'
              }}/>
          </div>
          <span className="conf-val" style={name===primary?{color:'var(--red)'}:{}}>
            {(val*100).toFixed(1)}%
          </span>
        </div>
      ))}
    </div>
  );
}

// ── Yield Gauge ───────────────────────────────────────────────────────
function YieldGauge({value,baseline=78}){
  const r=46,cx=60,cy=58;
  const toXY=pct=>{
    const a=Math.PI+(pct/100)*Math.PI;
    return [cx+r*Math.cos(a),cy+r*Math.sin(a)];
  };
  const arc=(s,e)=>{
    const[sx,sy]=toXY(s);const[ex,ey]=toXY(e);
    const large=(e-s)/100*Math.PI>Math.PI?1:0;
    return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
  };
  const color=value>=90?'var(--green)':value>=75?'var(--orange)':'var(--red)';
  const[bx,by]=toXY(baseline);
  return(
    <div className="yield-wrap">
      <svg width="120" height="70" viewBox="0 0 120 70">
        <path d={arc(0,100)} fill="none" stroke="var(--border2)" strokeWidth="7"/>
        <path d={arc(0,value)} fill="none" stroke={color} strokeWidth="7" strokeLinecap="round"/>
        <circle cx={bx} cy={by} r="3.5" fill="var(--orange)" opacity=".9"/>
        <text x={bx+5} y={by-3} fill="var(--orange)" fontSize="7" fontFamily="DM Mono">{baseline}%</text>
        <text x={cx} y={cy-6} textAnchor="middle" fill={color} fontSize="17" fontWeight="800" fontFamily="Bricolage Grotesque">{value}%</text>
        <text x={cx} y={cy+7} textAnchor="middle" fill="var(--muted)" fontSize="7" fontFamily="DM Mono">YIELD</text>
      </svg>
    </div>
  );
}

// ── Pipeline Steps ────────────────────────────────────────────────────
function Pipeline({stage}){
  const steps=[
    {icon:'📡',label:'AOI Input'},
    {icon:'🔬',label:'Feature Extract'},
    {icon:'🧠',label:'ML Inference'},
    {icon:'♻️',label:'Eco Score'},
    {icon:'💾',label:'DB Save'},
  ];
  return(
    <div style={{display:'flex',border:'1px solid var(--border)',overflow:'hidden'}}>
      {steps.map((s,i)=>(
        <div key={i} style={{
          flex:1,padding:'.45rem .3rem',textAlign:'center',
          borderRight:i<4?'1px solid var(--border)':'none',
          background:stage>i?'rgba(0,216,122,.06)':stage===i?'rgba(232,25,44,.08)':'transparent',
          transition:'background .3s',
        }}>
          <div style={{fontFamily:'var(--mono)',fontSize:'.52rem',color:'var(--muted)',marginBottom:'.15rem'}}>0{i+1}</div>
          <div style={{fontSize:'.85rem'}}>{s.icon}</div>
          <div style={{fontSize:'.55rem',fontWeight:600,color:stage>i?'var(--green)':stage===i?'var(--red)':'var(--muted)',marginTop:'.1rem',fontFamily:'var(--mono)'}}>{s.label}</div>
        </div>
      ))}
    </div>
  );
}

// ── History Table ─────────────────────────────────────────────────────
function HistoryPage({refresh}){
  const[scans,setScans]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`${API}/api/scans?limit=50`)
      .then(r=>r.json())
      .then(d=>setScans(d.scans||[]))
      .catch(()=>setScans([]))
      .finally(()=>setLoading(false));
  },[refresh]);
  if(loading)return<div style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'var(--mono)',fontSize:'.7rem'}}>Loading history...</div>;
  if(!scans.length)return<div style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'var(--mono)',fontSize:'.7rem'}}>No scans yet. Run an analysis to see history here.</div>;
  return(
    <div className="history-page">
      <div style={{marginBottom:'1rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:'1.1rem',fontWeight:800,letterSpacing:'-.02em'}}>Scan History</div>
          <div style={{fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--muted)',marginTop:'.2rem'}}>{scans.length} records — stored in SQLite</div>
        </div>
      </div>
      <table className="history-table">
        <thead>
          <tr>
            <th>SCAN ID</th><th>FILENAME</th><th>DEFECT</th>
            <th>CONFIDENCE</th><th>SEVERITY</th><th>YIELD</th>
            <th>WATER SAVED</th><th>COST SAVED</th><th>CASCADE</th><th>TIME (ms)</th>
          </tr>
        </thead>
        <tbody>
          {scans.map(s=>(
            <tr key={s.scan_id}>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.6rem',color:'var(--muted)'}}>{s.scan_id}</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.62rem',maxWidth:140,display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.filename}</span></td>
              <td>
                <span className="badge-defect" style={{background:`${DEFECT_COLORS[s.defect_type]}22`,color:DEFECT_COLORS[s.defect_type],border:`1px solid ${DEFECT_COLORS[s.defect_type]}55`}}>
                  {s.defect_type}
                </span>
              </td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.7rem',color:'var(--green)'}}>{(s.confidence*100).toFixed(1)}%</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.6rem',color:SEV_COLORS[s.severity]||'var(--muted)',textTransform:'uppercase'}}>{s.severity}</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.7rem',color:s.yield_percent>=80?'var(--green)':s.yield_percent>=65?'var(--orange)':'var(--red)'}}>{s.yield_percent}%</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--teal)'}}>{fmt(s.water_saved_liters)}L</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--green)'}}>${fmt(s.cost_saved_usd)}</span></td>
              <td><span style={{fontSize:'.8rem'}}>{s.cascade_prevention?'⚠️':'✅'}</span></td>
              <td><span style={{fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--muted)'}}>{s.inference_ms}ms</span></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Stats Page ────────────────────────────────────────────────────────
function StatsPage({refresh}){
  const[stats,setStats]=useState(null);
  useEffect(()=>{
    fetch(`${API}/api/stats`)
      .then(r=>r.json())
      .then(setStats)
      .catch(()=>setStats(null));
  },[refresh]);
  if(!stats)return<div style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'var(--mono)',fontSize:'.7rem'}}>Loading stats...</div>;
  const t=stats.totals||{};
  const dist=stats.distribution||[];
  const maxCount=Math.max(...dist.map(d=>d.count),1);
  const topCards=[
    {label:'Total Scans',val:t.total_scans||0,color:'var(--white)',fmt:v=>v},
    {label:'Total Water Saved',val:t.total_water_l||0,color:'var(--teal)',fmt:v=>fmt(v)+'L'},
    {label:'Total Energy Saved',val:t.total_energy_kwh||0,color:'var(--orange)',fmt:v=>fmt(v)+' kWh'},
    {label:'Total Cost Saved',val:t.total_cost_usd||0,color:'var(--green)',fmt:v=>'$'+fmt(v)},
  ];
  return(
    <div className="stats-page" style={{maxWidth:1000,margin:'0 auto',width:'100%'}}>
      <div className="stats-top">
        {topCards.map(c=>(
          <div className="stat-card" key={c.label}>
            <div className="stat-card-val" style={{color:c.color}}>{c.fmt(c.val)}</div>
            <div className="stat-card-lbl">{c.label}</div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-title">Defect Type Distribution</div>
          <div className="bar-chart">
            {dist.map(d=>(
              <div className="bar-row" key={d.defect_type}>
                <span className="bar-label">{d.defect_type}</span>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width:`${(d.count/maxCount*100).toFixed(1)}%`,
                    background:DEFECT_COLORS[d.defect_type]||'var(--muted2)',
                  }}>
                    <span className="bar-count" style={{color:'var(--bg)',fontFamily:'var(--mono)',fontSize:'.58rem'}}>{d.count}</span>
                  </div>
                </div>
                <span style={{fontFamily:'var(--mono)',fontSize:'.58rem',color:'var(--muted)',width:40,textAlign:'right'}}>{(d.avg_yield).toFixed(0)}% yield</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-title">Cumulative Sustainability Impact</div>
          <div style={{display:'flex',flexDirection:'column',gap:'.7rem',paddingTop:'.3rem'}}>
            {[
              {icon:'💧',label:'Water Saved',val:fmt(t.total_water_l||0)+'L',color:'var(--teal)'},
              {icon:'⚡',label:'Energy Saved',val:fmt(t.total_energy_kwh||0)+' kWh',color:'var(--orange)'},
              {icon:'💰',label:'Cost Saved',val:'$'+fmt(t.total_cost_usd||0),color:'var(--green)'},
              {icon:'♻️',label:'Wafers Rescued',val:fmt(t.total_wafers_rescued||0),color:'var(--purple)'},
              {icon:'🌿',label:'CO₂ Avoided',val:fmt((t.total_energy_kwh||0)*0.82)+'kg',color:'var(--green)'},
            ].map(item=>(
              <div key={item.label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.5rem .6rem',background:'var(--surface)',border:'1px solid var(--border)'}}>
                <span style={{display:'flex',alignItems:'center',gap:'.5rem',fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--muted)'}}>
                  <span>{item.icon}</span>{item.label}
                </span>
                <span style={{fontFamily:'var(--mono)',fontSize:'.75rem',fontWeight:600,color:item.color}}>{item.val}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="amd-strip">
        <div className="amd-logo">AMD</div>
        <div className="amd-details">
          <div>Platform: <span>AMD ROCm™ 6.0 target  •  INT8 Quantized inference</span></div>
          <div>Hardware: <span>AMD Instinct™ MI300 / Alveo™ U250  •  4× energy reduction vs CPU</span></div>
          <div>Dataset: <span>WM-811K (811,457 labeled wafer maps)  •  Real sklearn GBM model</span></div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState('analyze');
  const[file,setFile]=useState(null);
  const[drag,setDrag]=useState(false);
  const[loading,setLoading]=useState(false);
  const[loadStep,setLoadStep]=useState('');
  const[stage,setStage]=useState(-1);
  const[result,setResult]=useState(null);
  const[error,setError]=useState(null);
  const[toast,setToast]=useState(null);
  const[serverOk,setServerOk]=useState(false);
  const[modelInfo,setModelInfo]=useState(null);
  const[histRefresh,setHistRefresh]=useState(0);

  useEffect(()=>{
    fetch(`${API}/health`)
      .then(r=>r.json())
      .then(d=>{
        setServerOk(true);
        // Pull accuracy from health if model-info fails
        if(d.model_accuracy) setModelInfo({accuracy: d.model_accuracy, mode: d.model_mode});
      })
      .catch(()=>setServerOk(false));
    fetch(`${API}/api/model-info`)
      .then(r=>{ if(!r.ok) throw new Error('404'); return r.json(); })
      .then(d=>setModelInfo(d.meta || {accuracy: d.accuracy, mode: d.mode}))
      .catch(()=>{
        // fallback: get from health
        fetch(`${API}/health`).then(r=>r.json())
          .then(d=>{ if(d.model_accuracy) setModelInfo({accuracy:d.model_accuracy, mode:d.model_mode}); })
          .catch(()=>{});
      });
  },[]);

  const showToast=(msg,type='ok')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  };

  const handleFile=f=>{
    if(!f)return;
    setFile(f);setResult(null);setError(null);
    showToast(`Loaded: ${f.name}`);
  };

  const analyze=useCallback(async(demo=false)=>{
    setLoading(true);setResult(null);setError(null);setStage(0);
    const steps=[
      'Loading wafer map file...',
      'Extracting 47 spatial features...',
      'Running GBM ensemble classifier...',
      'Computing sustainability metrics...',
      'Saving to SQLite database...',
    ];
    let i=0;setLoadStep(steps[0]);
    const iv=setInterval(()=>{
      i=Math.min(i+1,steps.length-1);
      setLoadStep(steps[i]);setStage(i);
    },450);
    try{
      let body,ct;
      if(demo||!file){
        body=JSON.stringify({demo:true,filename:'demo_wafer.png'});
        ct='application/json';
      }else{
        const b64=await new Promise(res=>{
          const fr=new FileReader();
          fr.onload=e=>res(e.target.result.split(',')[1]||'');
          fr.readAsDataURL(file);
        });
        body=JSON.stringify({filename:file.name,image_data:b64});
        ct='application/json';
      }
      const resp=await fetch(`${API}/api/analyze`,{method:'POST',headers:{'Content-Type':ct},body});
      if(!resp.ok)throw new Error(`Server error ${resp.status}`);
      const data=await resp.json();
      if(data.error)throw new Error(data.error);
      clearInterval(iv);setStage(4);
      setResult(data);
      setHistRefresh(x=>x+1);
      showToast(`✔ ${data.inference.primary_defect} detected — saved to DB`);
    }catch(e){
      clearInterval(iv);
      setError(e.message);
      showToast(e.message,'error');
    }finally{
      setLoading(false);
    }
  },[file]);

  const acc=modelInfo?.accuracy;
  const mode=modelInfo?.mode;

  return(
    <div className="app">
      <header>
        <div className="logo">
          <div className="logo-hex">⬡</div>
          Eco<em>Yield</em>&nbsp;AI
        </div>
        <div className="header-right">
          <div className="pill">
            <div className={`dot ${serverOk?'green':'red'}`}/>
            {serverOk?'BACKEND ONLINE':'OFFLINE'}
          </div>
          {acc&&<div className="pill" style={{color:'var(--green)',borderColor:'rgba(0,216,122,.3)'}}>
            MODEL {(acc*100).toFixed(1)}% ACC
          </div>}
          <div className="pill" style={{color:'var(--orange)',borderColor:'rgba(245,130,31,.3)'}}>
            AMD ROCm™
          </div>
        </div>
      </header>

      <div className="tabs">
        {[['analyze','⬡ Analyze'],['history','⏱ History'],['stats','📊 Stats']].map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      <div className="content">
        {tab==='analyze'&&(
          <div className="analyze-layout">
            {/* Left */}
            <div className="panel-left">
              <div>
                <div className="section-label">Wafer Map Input</div>
                <div
                  className={`upload-zone ${drag?'drag':''}`}
                  onDragOver={e=>{e.preventDefault();setDrag(true)}}
                  onDragLeave={()=>setDrag(false)}
                  onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])}}
                >
                  <input type="file" accept=".pkl,.png,.jpg,.jpeg,.bmp"
                    onChange={e=>handleFile(e.target.files[0])}/>
                  <div className="upload-icon">⬡</div>
                  <div className="upload-title">{file?file.name:'Drop Wafer Map'}</div>
                  <div className="upload-sub">
                    {file?`${(file.size/1024).toFixed(1)} KB — Click to change`:'.pkl  .png  .jpg  (WM-811K format)'}
                  </div>
                </div>
              </div>

              <div className="wafer-wrap">
                <div className="section-label" style={{alignSelf:'flex-start'}}>Wafer Preview</div>
                <div className="wafer-ring">
                  <WaferCanvas file={file}/>
                </div>
                <div className="file-info">
                  {file?`${file.name}\n${new Date(file.lastModified).toLocaleDateString()}`:'No file — use Demo mode below'}
                </div>
              </div>

              <div>
                <div className="section-label">Processing Pipeline</div>
                <Pipeline stage={loading?stage:result?5:-1}/>
              </div>

              <button className={`btn-primary${loading?' loading':''}`}
                onClick={()=>analyze(false)} disabled={loading||!file}>
                {loading?'◌  Running Analysis...':'▶  Run Analysis'}
              </button>
              <button className="btn-secondary" onClick={()=>analyze(true)} disabled={loading}>
                ⚡ Demo Mode (no file needed)
              </button>

              <div className="model-stack">
                <div className="section-label">Model & Hardware</div>
                {[
                  ['Model','GBM + 47-feature ViT-style'],
                  ['Dataset','WM-811K (811,457 maps)'],
                  ['Accuracy',acc?(acc*100).toFixed(1)+'%':serverOk?'Loaded ✓':'—'],
                  ['Mode',mode||'GBM ensemble'],
                  ['Hardware','AMD Instinct™ / Alveo™'],
                  ['Platform','AMD ROCm™ 6.0'],
                  ['Quantization','INT8 (4× energy saving)'],
                ].map(([k,v])=>(
                  <div className="model-row" key={k}>
                    <span className="model-key">{k}</span>
                    <span className={`model-val ${k==='Hardware'||k==='Platform'?'amd':k==='Accuracy'?'ok':''}`}>{v}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Right */}
            <div className="panel-right">
              {loading&&(
                <div className="loading-box">
                  <div className="spinner"/>
                  <div className="loading-label">RUNNING REAL ML INFERENCE</div>
                  <div className="loading-step">{loadStep}</div>
                </div>
              )}
              {!loading&&!result&&!error&&(
                <div className="empty">
                  <div className="empty-icon">⬡</div>
                  <div className="empty-h">No Analysis Yet</div>
                  <div className="empty-p">Upload a WM-811K wafer map (.pkl or image) or click Demo Mode to test the real ML pipeline.</div>
                </div>
              )}
              {!loading&&error&&(
                <div className="empty">
                  <div className="empty-icon">⚠️</div>
                  <div className="empty-h">Analysis Failed</div>
                  <div className="empty-p">{error}</div>
                </div>
              )}
              {!loading&&result&&(()=>{
                const{inference:inf,sustainability:sus,defect_info:di}=result;
                return(<>
                  {/* Header */}
                  <div className="result-head">
                    <div>
                      <div className="section-label">Primary Defect</div>
                      <div className="defect-title" style={{color:di.color}}>{inf.primary_defect}</div>
                      <div className="defect-desc">
                        {{'Center':'Clustered defects at wafer center','Donut':'Ring-shaped defect pattern','Edge-Loc':'Defects localized at wafer edge','Edge-Ring':'Full ring defect at perimeter','Loc':'Random localized clusters','Near-Full':'Near-complete surface defects','Scratch':'Linear scratch pattern','Random':'Randomly distributed defects','None':'No significant defect detected ✓'}[inf.primary_defect]}
                      </div>
                      <div className="tag-row">
                        <span className={`tag tag-sev-${inf.severity}`}>{inf.severity}</span>
                        <span className="tag tag-gray">{inf.inference_ms}ms</span>
                        <span className="tag tag-gray">{inf.features_extracted ? inf.features_extracted+' features' : '47 features'}</span>
                        <span className="tag tag-amd">AMD ROCm™</span>
                        <span className="tag tag-gray">{result.scan_id ? '#'+result.scan_id : 'DEMO'}</span>
                      </div>
                    </div>
                    <div style={{flexShrink:0,textAlign:'right'}}>
                      <div className="conf-lbl">CONFIDENCE</div>
                      <div className="conf-big">{(inf.confidence*100).toFixed(1)}%</div>
                      <div style={{marginTop:'.4rem'}}><YieldGauge value={inf.yield_percent}/></div>
                    </div>
                  </div>

                  {/* Cascade alert */}
                  {sus.cascade_prevention&&(
                    <div className="cascade">
                      <div className="cascade-icon">⚠️</div>
                      <div className="cascade-text">
                        <strong>Cascading Scrap Prevented.</strong> Early detection at AOI stage stops{' '}
                        <strong>{sus.wafers_rescued} wafers</strong> from costly downstream fab steps.
                        Estimated <strong>${sus.cost_saved_usd.toLocaleString()} saved</strong> this lot.
                        Result saved to database — Scan <strong>#{result.scan_id}</strong>.
                      </div>
                    </div>
                  )}

                  {/* Heatmap + Confidence */}
                  <div className="grid-2">
                    <div className="card">
                      <div className="card-title">Grad-CAM Heatmap (8×8)</div>
                      <Heatmap data={inf.heatmap_8x8}/>
                      <div style={{fontFamily:'var(--mono)',fontSize:'.55rem',color:'var(--muted)',marginTop:'.5rem'}}>
                        Defect density map — hover cells for values
                      </div>
                    </div>
                    <div className="card">
                      <div className="card-title">Class Confidence Scores</div>
                      <ConfBars confs={inf.all_confidences} primary={inf.primary_defect}/>
                      <div style={{marginTop:'.7rem',padding:'.5rem .6rem',background:'var(--surface)',border:'1px solid var(--border)'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.3rem'}}>
                          <span style={{fontFamily:'var(--mono)',fontSize:'.58rem',color:'var(--muted)'}}>Model accuracy</span>
                          <span style={{fontFamily:'var(--mono)',fontSize:'.6rem',color:'var(--green)'}}>{acc?(acc*100).toFixed(1)+'%':'—'}</span>
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between'}}>
                          <span style={{fontFamily:'var(--mono)',fontSize:'.58rem',color:'var(--muted)'}}>Defect density</span>
                          <span style={{fontFamily:'var(--mono)',fontSize:'.6rem',color:'var(--white)'}}>
                            {inf.defect_density != null && !isNaN(inf.defect_density) ? (inf.defect_density*100).toFixed(2)+'%' : '—'}
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Sustainability */}
                  <div className="card">
                    <div className="card-title">♻️ Sustainability Impact — Lot of {sus.lot_size} Wafers</div>
                    <div className="sustain-grid">
                      {[
                        {icon:'💧',val:fmt(sus.water_saved_liters)+'L',lbl:'Water Saved',color:'var(--teal)'},
                        {icon:'⚡',val:sus.energy_saved_kwh+' kWh',lbl:'Energy Saved',color:'var(--orange)'},
                        {icon:'💰',val:'$'+fmt(sus.cost_saved_usd),lbl:'Cost Saved',color:'var(--green)'},
                        {icon:'🌿',val:sus.co2_saved_kg+'kg',lbl:'CO₂ Avoided',color:'var(--green)'},
                        {icon:'🏠',val:sus.homes_powered_days,lbl:'Homes Powered (days)',color:'var(--purple)'},
                        {icon:'💎',val:fmt(sus.silicon_saved_grams)+'g',lbl:'Silicon Rescued',color:'var(--teal)'},
                      ].map(item=>(
                        <div className="sustain-item" key={item.lbl}>
                          <div className="sustain-icon">{item.icon}</div>
                          <div className="sustain-val" style={{color:item.color}}>{item.val}</div>
                          <div className="sustain-lbl">{item.lbl}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:'.8rem',padding:'.5rem .7rem',background:'var(--surface)',border:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:'.58rem',color:'var(--muted)'}}>
                      {sus.amd_advantage}
                    </div>
                  </div>

                  {/* Yield + Lot */}
                  <div className="grid-2">
                    <div className="card">
                      <div className="card-title">Yield Analysis</div>
                      <div className="grid-3">
                        {[
                          {val:inf.yield_percent+'%',lbl:'Predicted Yield',color:'var(--white)'},
                          {val:(sus.yield_delta>=0?'+':'')+sus.yield_delta+'%',lbl:'vs Baseline',color:sus.yield_delta>=0?'var(--green)':'var(--red)'},
                          {val:sus.wafers_rescued,lbl:'Wafers Rescued',color:'var(--orange)'},
                        ].map(s=>(
                          <div key={s.lbl}>
                            <div className="stat-val" style={{color:s.color,fontSize:'1.3rem'}}>{s.val}</div>
                            <div className="stat-lbl">{s.lbl}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="card">
                      <div className="card-title">Lot Summary</div>
                      <div style={{fontFamily:'var(--mono)',fontSize:'.6rem',lineHeight:2,color:'var(--muted)'}}>
                        {[
                          ['Scan ID', '#'+result.scan_id],
                          ['Filename', result.filename],
                          ['Lot Size', sus.lot_size+' wafers'],
                          ['Timestamp', result.timestamp],
                        ].map(([k,v])=>(
                          <div key={k} style={{display:'flex',justifyContent:'space-between'}}>
                            <span>{k}</span>
                            <span style={{color:'var(--white)',fontSize:'.58rem'}}>{v}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="amd-strip">
                    <div className="amd-logo">AMD</div>
                    <div className="amd-details">
                      <div>Hardware: <span>AMD Instinct™ MI300 / Alveo™ U250</span></div>
                      <div>Platform: <span>ROCm™ 6.0  •  INT8 Quantized  •  {'<'}50ms inference target</span></div>
                      <div>Dataset: <span>WM-811K 811,457 wafer maps  •  Real GBM classifier</span></div>
                    </div>
                  </div>
                </>);
              })()}
            </div>
          </div>
        )}
        {tab==='history'&&<HistoryPage refresh={histRefresh}/>}
        {tab==='stats'&&<StatsPage refresh={histRefresh}/>}
      </div>

      {toast&&<div className={`toast ${toast.type==='error'?'err':''}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
